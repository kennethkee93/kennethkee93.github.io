name: Scheduled App Shutdown
on:
  schedule:
    # 16:00 UTC March 31 = 00:00 GMT+8 April 1
    - cron: '0 16 31 3 *'
  workflow_dispatch: # Allows manual testing via the Actions tab

jobs:
  shutdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Shutdown Files
        run: |
          # 1. Replace main entry with your "Moved" notice
          cp shutdown.html index.html
          
          # 2. Overwrite the Service Worker to break the cache
          # Adjust the filename below to match your actual SW file (e.g., sw.js)
          cp sw-kill.js sw.js
          
          # 3. Clean up old app files to ensure no accidental loading
          # Replace 'dist' or 'assets' with your actual folder names
          rm -rf js/ css/ assets/ 

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated shutdown: App transitioned to new location"
          git push