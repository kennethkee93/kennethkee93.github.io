name: Scheduled App Shutdown
on:
  schedule:
    # 16:00 UTC March 31 = 00:00 GMT+8 April 1 (KL Time)
    - cron: '0 16 31 3 *'
  workflow_dispatch: 

jobs:
  shutdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Shutdown Files
        run: |
          # 1. Overwrite the main index with your "Moved" message
          cp shutdown.html index.html
          
          # 2. Overwrite the ACTUAL service worker file used by your app
          cp sw-kill.js service-worker.js
          
          # 3. Optional: If you have a manifest, point it to index.html
          # cp new-manifest.json assets/images/favicons/site.webmanifest

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html service-worker.js
          git commit -m "Automated shutdown: Service Worker killed and App moved"
          git push
